global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: aggregator_backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  # Org-scoped targets are generated by backend in AGG_DATA_DIR/prom_sd.
  # Example file entry:
  # [
  #   {
  #     "targets": ["10.0.0.10:9191"],
  #     "labels": {
  #       "org_id": "<org-uuid>",
  #       "target_name": "node-agent",
  #       "__scheme__": "http",
  #       "__metrics_path__": "/metrics"
  #     }
  #   }
  # ]
  - job_name: vlf_observability_targets
    file_sd_configs:
      - files:
          - /etc/prometheus/sd/org_*.json
