listen: "0.0.0.0:9191"
token: "CHANGE_ME"
# You can provide multiple tokens separated by commas.
# token: "tokenA,tokenB"
allow_cidrs:
  - "1.2.3.4/32"
activity_log_path: "/var/log/vlf-agent/activity.log"
error_log_path: "/var/log/vlf-agent/error.log"
poll_window_seconds: 60
stats_mode: "log"
rate_limit_rps: 5
adminer_port: 18081
sqlite_port: 18082
sqlite_roots:
  - "/opt"
  - "/var/lib"
fs_max_text_bytes: 2097152
fs_max_upload_bytes: 52428800

