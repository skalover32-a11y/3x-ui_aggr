listen: "0.0.0.0:9191"
token: "CHANGE_ME"
# You can provide multiple tokens separated by commas.
# token: "tokenA,tokenB"
allow_cidrs:
  - "1.2.3.4/32"
xray_access_log_path: "/var/log/xray/access.log"
xray_error_log_path: "/var/log/xray/error.log"
poll_window_seconds: 60
stats_mode: "log"
rate_limit_rps: 5
adminer_port: 18081
sqlite_port: 18082
sqlite_roots:
  - "/opt"
  - "/var/lib"
