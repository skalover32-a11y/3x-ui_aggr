services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agg
      POSTGRES_USER: agg
      POSTGRES_PASSWORD: agg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agg -d agg -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    environment:
      DB_DSN: postgres://agg:agg@postgres:5432/agg?sslmode=disable
      AGG_MASTER_KEY_BASE64: ${AGG_MASTER_KEY_BASE64}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "18080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: /api
    ports:
      - "15173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://agg:agg@postgres:5432/agg?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
