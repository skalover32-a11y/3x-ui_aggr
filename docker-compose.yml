services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agg
      POSTGRES_USER: agg
      POSTGRES_PASSWORD: agg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agg -d agg -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 30

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://agg:agg@postgres:5432/agg?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./.env
    environment:
      DB_DSN: postgres://agg:agg@postgres:5432/agg?sslmode=disable

      AGG_MASTER_KEY_BASE64: ${AGG_MASTER_KEY_BASE64}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}

      SUDO_PASSWORDS: ${SUDO_PASSWORDS}
      AGG_ALLOW_CIDR: ${AGG_ALLOW_CIDR}
      AGG_REPO_PATH: ${AGG_REPO_PATH}
      AGG_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: /api
    ports:
      - "15173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prom_sd:/etc/prometheus/sd:ro
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
